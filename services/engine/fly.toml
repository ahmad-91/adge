app = "adge-engine"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  MC_PATHS = "80"
  JOB_STORE_BACKEND = "sqlite"
  JOB_STORE_PATH = "/data/jobs.sqlite"
  # Independent options/IV history (REQUIRED for validation):
  # DATA_SOURCE_URL = "https://static.philippdubach.com/data/options/{ticker}/options.parquet"
  # OPTIONS_TICKERS = "SPY,QQQ,AAPL"

[mounts]
  source = "adge_engine_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
